    <section class="app-container">
        <aside class="section-left">
			 <span>total items <span id="total-item-counter">0</span> </span>
		  </aside>

		  <main class="section-main">

          <div class="card-container">
			 <!-- template for card-->

			 <!-- -->
         </div>


			 <template class="item-card-template">
				<div class="item-card">
				  <img src="#" alt="item-image" class="item-card-image"/>
				  <div class="item-card-details">
                  <span class="item-card-name"></span>
                  <span class="item-card-price"></span>
				  </div>
				  <button class="item-card-action-button">
					 <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>

				</div>
			 </template>



		  </main>

		  <aside class="section-right">
			 <span>added items <span id="added-items-counter">0</span>
		  <div class="added-items-list">
			 <ul>

			
			 </ul>
        	<!-- template for added items -->
				<template id="list-item-template">
				  <div>	 
				  <li class="item">
					 <div>
						<span class="item-name"></span>
						<span class="item-price"></span>
					 </div>
					 <div class="qty-counter">
						<button class="qty-decrement">-</button>
						<span class="qty-counter-b">0</span>
						<button class="qty-increment">+</button>
					 </div>
				  </li>

				  </div>

						X
					 </button>

 </aside>
